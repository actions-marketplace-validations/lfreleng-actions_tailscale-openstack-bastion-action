name: Test

# yamllint disable-line rule:truthy
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: "Test bastion action"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Run tests with pytest
        run: |
          pytest --cov --cov-report=xml --cov-report=term

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        if: matrix.python-version == '3.11'
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  actionlint:
    name: "Lint workflow files"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Download actionlint
        id: get_actionlint
        env:
          # Pin the installer to an immutable commit SHA (tag v1.7.12) and
          # request a fixed actionlint version, rather than fetching the
          # script from the moving 'main' branch and installing 'latest'.
          ACTIONLINT_VERSION: "1.7.12"
          ACTIONLINT_SCRIPT_REF: "914e7df21a07ef503a81201c76d2b11c789d3fca"
          ACTIONLINT_RAW_BASE: "https://raw.githubusercontent.com/rhysd/actionlint"
        run: |
          script_url="${ACTIONLINT_RAW_BASE}/${ACTIONLINT_SCRIPT_REF}/scripts/download-actionlint.bash"
          curl --proto '=https' --tlsv1.2 -sSfL "${script_url}" -o download-actionlint.bash
          bash download-actionlint.bash "${ACTIONLINT_VERSION}"
        shell: bash

      - name: Check workflow files
        run: |
          "${STEPS_GET_ACTIONLINT_OUTPUTS_EXECUTABLE}" -color
        shell: bash
        env:
          STEPS_GET_ACTIONLINT_OUTPUTS_EXECUTABLE: ${{ steps.get_actionlint.outputs.executable }}

  pre-commit:
    name: "Pre-commit checks"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"

      - name: Run pre-commit
        env:
          # gha-workflow-linter requires API access not available here;
          # it is enforced separately and skipped on pre-commit.ci.
          SKIP: no-commit-to-branch,gha-workflow-linter
        run: pipx run pre-commit run --all-files --show-diff-on-failure
